<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineReads — Movie & Book Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0e14;--surface:#13141c;--surface2:#1a1b26;--border:#252636;--accent:#e8b86d;--accent2:#c97ef0;--text:#e8e9f0;--text-muted:#7e8098;--movie-tag:#1e3a5f;--movie-glow:#4a90d9;--book-tag:#2d1f4e;--book-glow:#9b6cd8;--radius:12px;--shadow:0 8px 32px rgba(0,0,0,.5);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,184,109,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(155,108,216,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
#hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative;z-index:1;transition:all .5s cubic-bezier(.4,0,.2,1);}
#hero.compact{min-height:unset;padding:1.5rem 2rem;flex-direction:row;align-items:center;gap:2rem;background:rgba(13,14,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;letter-spacing:-.02em;line-height:1;margin-bottom:.3em;transition:font-size .4s;cursor:pointer;}
#hero.compact .logo{font-size:1.6rem;margin-bottom:0;}
.logo .cine{color:var(--accent);}.logo .reads{color:var(--accent2);}
.tagline{color:var(--text-muted);font-size:1rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2.5rem;}
#hero.compact .tagline{display:none;}
.search-wrapper{width:100%;max-width:660px;position:relative;}
#hero.compact .search-wrapper{max-width:480px;flex:1;}
.search-box{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:50px;padding:.55rem .55rem .55rem 1.4rem;gap:.75rem;transition:border-color .2s,box-shadow .2s;}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,184,109,.15),var(--shadow);}
#search-input{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--text);caret-color:var(--accent);}
#search-input::placeholder{color:var(--text-muted);}
.search-btn{background:var(--accent);border:none;border-radius:40px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,background .15s;flex-shrink:0;}
.search-btn:hover{background:#f0c87a;transform:scale(1.05);}
.search-btn svg{width:18px;height:18px;fill:#0d0e14;}
.autocomplete-dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);z-index:200;display:none;}
.autocomplete-dropdown.open{display:block;}
.autocomplete-item{padding:.65rem 1.2rem;cursor:pointer;font-size:.93rem;color:var(--text-muted);transition:background .15s,color .15s;}
.autocomplete-item:hover{background:var(--surface);color:var(--text);}
.filters{display:flex;align-items:center;gap:.6rem;margin-top:1.2rem;flex-wrap:wrap;justify-content:center;}
#hero.compact .filters{margin-top:0;}
.filter-group{display:flex;gap:.4rem;}
.filter-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text-muted);border-radius:50px;padding:.35rem .95rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;}
.filter-btn.active{background:rgba(232,184,109,.15);border-color:var(--accent);color:var(--accent);}
.filter-btn.mode-btn.active{background:rgba(155,108,216,.15);border-color:var(--accent2);color:var(--accent2);}
.divider{width:1px;height:20px;background:var(--border);}
.index-stats{display:flex;gap:.6rem;margin-top:1.8rem;flex-wrap:wrap;justify-content:center;}
#hero.compact .index-stats{display:none;}
.stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:.3rem .9rem;font-size:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:.35rem;}
.stat-pill strong{color:var(--text);}
#results-area{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1;display:none;}
#results-area.visible{display:block;}
.results-meta{font-size:.83rem;color:var(--text-muted);margin-bottom:1.5rem;}
.results-meta strong{color:var(--accent);}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;margin-bottom:1rem;display:flex;gap:1.2rem;align-items:flex-start;position:relative;overflow:hidden;transition:border-color .2s,transform .15s,box-shadow .2s;animation:cardIn .3s ease both;}
.result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.result-card.movie::before{background:var(--movie-glow);}
.result-card.book::before{background:var(--book-glow);}
.result-card:hover{border-color:rgba(232,184,109,.3);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.35);}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-card:nth-child(1){animation-delay:.03s}.result-card:nth-child(2){animation-delay:.07s}.result-card:nth-child(3){animation-delay:.11s}.result-card:nth-child(4){animation-delay:.15s}.result-card:nth-child(5){animation-delay:.18s}
.rank-badge{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--border);min-width:28px;text-align:center;flex-shrink:0;padding-top:2px;}
.card-body{flex:1;min-width:0;}
.card-header{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:.4rem;flex-wrap:wrap;}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--text);line-height:1.3;flex:1;}
mark{background:rgba(232,184,109,.25);color:var(--accent);border-radius:2px;padding:0 1px;}
.type-badge{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .6rem;border-radius:50px;flex-shrink:0;margin-top:2px;}
.type-badge.movie{background:var(--movie-tag);color:var(--movie-glow);}
.type-badge.book{background:var(--book-tag);color:var(--book-glow);}
.card-meta{font-size:.82rem;color:var(--text-muted);margin-bottom:.55rem;display:flex;flex-wrap:wrap;gap:.4rem .8rem;}
.star{color:var(--accent);}
.card-snippet{font-size:.88rem;color:var(--text-muted);line-height:1.65;}
.score-bar-wrap{display:flex;align-items:center;gap:.5rem;margin-top:.7rem;}
.score-bar{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.score-label{font-size:.7rem;color:var(--text-muted);}
.no-results{text-align:center;padding:4rem 2rem;color:var(--text-muted);}
.no-results .emoji{font-size:3rem;display:block;margin-bottom:1rem;}
.no-results h3{color:var(--text);font-family:'Playfair Display',serif;margin-bottom:.5rem;}
.spinner{display:flex;justify-content:center;padding:3rem;}
.spinner-ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<section id="hero">
  <div class="logo" onclick="goHome()"><span class="cine">Cine</span><span class="reads">Reads</span></div>
  <p class="tagline">Search Movies &amp; Books — Powered by Inverted Index</p>
  <div class="search-wrapper">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:#7e8098;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Search movies, books, authors, genres…" autocomplete="off" spellcheck="false">
      <button class="search-btn" id="search-btn"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
    </div>
    <div class="autocomplete-dropdown" id="autocomplete"></div>
  </div>
  <div class="filters">
    <div class="filter-group" id="type-filters">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="movie">🎬 Movies</button>
      <button class="filter-btn" data-type="book">📚 Books</button>
    </div>
    <div class="divider"></div>
    <div class="filter-group" id="mode-filters">
      <button class="filter-btn mode-btn" data-mode="OR">OR</button>
      <button class="filter-btn mode-btn active" data-mode="AND">AND</button>
    </div>
  </div>
  <div class="index-stats">
    <div class="stat-pill">⚡ Inverted Index</div>
    <div class="stat-pill" id="stat-movies">🎬 <strong>—</strong> movies</div>
    <div class="stat-pill" id="stat-books">📚 <strong>—</strong> books</div>
    <div class="stat-pill" id="stat-terms">🔤 <strong>—</strong> terms</div>
  </div>
</section>
<main id="results-area">
  <div class="results-meta" id="results-meta"></div>
  <div id="results-list"></div>
</main>
<script>
let activeType='all',activeMode='AND',debounceTimer=null,lastQuery='';
async function loadStats(){try{const r=await fetch('/api/stats');const d=await r.json();document.getElementById('stat-movies').innerHTML='🎬 <strong>'+d.movies.toLocaleString()+'</strong> movies';document.getElementById('stat-books').innerHTML='📚 <strong>'+d.books.toLocaleString()+'</strong> books';document.getElementById('stat-terms').innerHTML='🔤 <strong>'+d.unique_terms.toLocaleString()+'</strong> terms';}catch(e){}}
loadStats();
function goHome(){input.value='';hero.classList.remove('compact');results.classList.remove('visible');list.innerHTML='';meta.innerHTML='';lastQuery='';closeAC();}
document.querySelectorAll('#type-filters .filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#type-filters .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeType=btn.dataset.type;if(lastQuery)doSearch(lastQuery);});});
document.querySelectorAll('#mode-filters .filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#mode-filters .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeMode=btn.dataset.mode;if(lastQuery)doSearch(lastQuery);});});
const input=document.getElementById('search-input'),hero=document.getElementById('hero'),results=document.getElementById('results-area'),list=document.getElementById('results-list'),meta=document.getElementById('results-meta');
document.getElementById('search-btn').addEventListener('click',()=>triggerSearch());
input.addEventListener('keydown',e=>{if(e.key==='Enter')triggerSearch();});
input.addEventListener('input',()=>{clearTimeout(debounceTimer);const q=input.value.trim();if(q.length>=2){debounceTimer=setTimeout(()=>fetchSuggestions(q),200);}else{closeAC();}});
function triggerSearch(){closeAC();const q=input.value.trim();if(!q)return;doSearch(q);}
async function doSearch(q){lastQuery=q;hero.classList.add('compact');results.classList.add('visible');list.innerHTML='<div class="spinner"><div class="spinner-ring"></div></div>';meta.textContent='';try{const r=await fetch('/api/search?q='+encodeURIComponent(q)+'&type='+activeType+'&mode='+activeMode+'&k=10');const d=await r.json();renderResults(d);}catch(e){list.innerHTML='<div class="no-results"><span class="emoji">⚠️</span><h3>Server error</h3></div>';}}
function highlight(text,terms){if(!text||!terms||!terms.length)return text||'';const esc=terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');try{return text.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>');}catch{return text;}}
function stars(r,m){const n=r/m*5;const f=Math.floor(n);const h=n-f>=0.5?1:0;return '★'.repeat(f)+(h?'½':'')+('☆'.repeat(5-f-h));}
function renderResults(data){const rawQuery=input.value.trim();const qWords=rawQuery.split(/\s+/).filter(Boolean);if(!data.results.length){list.innerHTML='<div class="no-results"><span class="emoji">🔍</span><h3>No results for "'+rawQuery+'"</h3><p>Try OR mode or check spelling.</p></div>';meta.innerHTML='';return;}const maxScore=Math.max(...data.results.map(r=>r.score),1);meta.innerHTML='Found <strong>'+data.total+'</strong> result'+(data.total!==1?'s':'')+' for "<strong>'+rawQuery+'</strong>" &nbsp;·&nbsp; Mode: <strong>'+data.mode+'</strong>';list.innerHTML=data.results.map((r,i)=>{const isMovie=r.type==='movie';const maxRating=isMovie?10:5;const bw=Math.round((r.score/maxScore)*100);const sub=isMovie?[r.director&&'Dir. '+r.director,r.genres,r.year].filter(Boolean).join(' · '):[r.author,r.category,r.year].filter(Boolean).join(' · ');const snip=highlight(r.snippet||r.overview||r.description||'',qWords);const titleHL=highlight(r.title,qWords);return '<article class="result-card '+r.type+'" style="animation-delay:'+(i*0.04)+'s"><div class="rank-badge">'+(i+1)+'</div><div class="card-body"><div class="card-header"><h2 class="card-title">'+titleHL+'</h2><span class="type-badge '+r.type+'">'+(isMovie?'🎬 Movie':'📚 Book')+'</span></div><div class="card-meta"><span>'+sub+'</span>'+(r.rating?'<span><span class="star">'+stars(r.rating,maxRating)+'</span> '+r.rating+'</span>':'')+' </div><p class="card-snippet">'+(snip||'<em style="opacity:.5">No description.</em>')+'</p><div class="score-bar-wrap"><div class="score-bar"><div class="score-bar-fill" style="width:'+bw+'%"></div></div><span class="score-label">Relevance '+bw+'%</span></div></div></article>';}).join('');}
const acDropdown=document.getElementById('autocomplete');
async function fetchSuggestions(q){try{const r=await fetch('/api/suggest?q='+encodeURIComponent(q));const d=await r.json();if(d.suggestions.length){acDropdown.innerHTML=d.suggestions.map(s=>'<div class="autocomplete-item" data-val="'+s.replace(/"/g,'&quot;')+'">🔍 '+s+'</div>').join('');acDropdown.classList.add('open');}else{closeAC();}}catch{closeAC();}}
acDropdown.addEventListener('click',e=>{const item=e.target.closest('.autocomplete-item');if(item){input.value=item.dataset.val;closeAC();triggerSearch();}});
function closeAC(){acDropdown.classList.remove('open');acDropdown.innerHTML='';}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrapper'))closeAC();});
input.addEventListener('keydown',e=>{if(e.key==='Escape')closeAC();});
</script>
</body>
</html>
